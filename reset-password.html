<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vista | Reset Password</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-page">
  <nav class="navbar">
    <div class="container nav-inner" style="justify-content: center;">
      <a href="index.html" class="logo">
        <i class="ph ph-house-line"></i> Vista
      </a>
    </div>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <h2 style="text-align: center; margin-bottom: 8px;">Create New Password</h2>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 32px;">Please securely enter your brand new password below.</p>
      
      <form id="resetForm" class="auth-form">
        <div class="input-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" required placeholder="••••••••" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius);">
        </div>
        <div class="input-group" style="margin-top: 20px;">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" required placeholder="••••••••" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius);">
        </div>
        
        <button type="submit" class="btn btn-primary w-full" id="resetBtn" style="margin-top: 32px;">Save New Password</button>
      </form>
    </div>
  </main>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="toast.js"></script>
  <script>
      const resetForm = document.getElementById('resetForm');
      const resetBtn = document.getElementById('resetBtn');

      // Extremely native verification: Supabase magically maps the URL '#access_token' into an active Recovery Session directly upon script load
      
      resetForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const p1 = document.getElementById('newPassword').value;
          const p2 = document.getElementById('confirmPassword').value;

          if(p1.length < 6) return showToast('Password must legally be at least 6 characters.', 'error');
          if(p1 !== p2) return showToast('Passwords mathematically do not match!', 'error');

          resetBtn.disabled = true;
          resetBtn.textContent = 'Saving...';

          // Strictly execute the update natively
          const { error } = await supabase.auth.updateUser({ password: p1 });
          
          if(error) {
              showToast('Failed to update: ' + error.message, 'error');
              resetBtn.disabled = false;
              resetBtn.textContent = 'Save New Password';
          } else {
              showToast('Password brilliantly updated!', 'success');
              // Wipe out the strict recovery session natively preventing token bleeding
              await supabase.auth.signOut();
              setTimeout(() => {
                  window.location.href = 'login.html';
              }, 1500);
          }
      });
  </script>
</body>
</html>
