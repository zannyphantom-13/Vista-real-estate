<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vista | Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-page">
  <nav class="navbar">
    <div class="container nav-inner" style="justify-content: center;">
      <a href="index.html" class="logo">
        <i class="ph ph-house-line"></i> Vista
      </a>
    </div>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <h2>Reset Password</h2>
      <p id="resetSubtitle">Enter your new master password below.</p>
      
      <form id="resetForm" class="auth-form">
        <div class="input-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" required placeholder="••••••••" style="padding-right: 48px;">
        </div>
        
        <button type="submit" class="btn btn-primary w-full" id="submitBtn">Update Password</button>
      </form>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="toast.js"></script>
  <script>
    // Firebase sends action codes in the URL: ?mode=resetPassword&oobCode=XYZ
    const params = new URLSearchParams(window.location.search);
    const actionCode = params.get('oobCode');

    const resetForm = document.getElementById('resetForm');
    const newPasswordInput = document.getElementById('newPassword');
    const submitBtn = document.getElementById('submitBtn');

    if (!actionCode) {
        document.getElementById('resetSubtitle').textContent = "Invalid or expired link. Please request a new password reset email.";
        newPasswordInput.disabled = true;
        submitBtn.disabled = true;
    }

    resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = newPasswordInput.value;
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Updating...';

        try {
            await auth.confirmPasswordReset(actionCode, newPassword);
            showToast('Password updated successfully! You can now log in.', 'success');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        } catch (error) {
            showToast('Failed to reset password: ' + error.message, 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Update Password';
        }
    });
  </script>
</body>
</html>
