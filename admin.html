<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vista | Admin Dashboard</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-color" style="display: none;" id="adminBody">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <i class="ph ph-house-line"></i> Vista Admin
      </a>
      <div class="nav-actions">
        <button id="logoutBtn" class="btn btn-secondary">Log Out</button>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container" style="padding: 60px 20px;">
    <div style="max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 16px; box-shadow: var(--shadow-lg);">
      <h1 style="margin-bottom: 8px;">Upload New Property</h1>
      <p style="color: var(--text-muted); margin-bottom: 32px;">Fill in the details below to list a new property on Vista.</p>
      
      <form id="uploadForm" class="auth-form">
        <!-- Basic Info -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="input-group">
            <label for="title">Title</label>
            <input type="text" id="title" required placeholder="e.g. Modern Apartment with City Views">
          </div>
          <div class="input-group">
            <label for="price">Price ($)</label>
            <input type="number" id="price" required min="1" placeholder="e.g. 650000">
          </div>
        </div>

        <div class="input-group">
          <label for="address">Address</label>
          <input type="text" id="address" required placeholder="e.g. 1200 Brickell Ave, Miami, FL">
        </div>

        <!-- Details -->
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
          <div class="input-group">
            <label for="beds">Beds</label>
            <input type="number" id="beds" required min="0" placeholder="e.g. 3">
          </div>
          <div class="input-group">
            <label for="baths">Baths</label>
            <input type="number" id="baths" required min="0" placeholder="e.g. 2">
          </div>
          <div class="input-group">
            <label for="sqft">Square Feet</label>
            <input type="number" id="sqft" required min="100" placeholder="e.g. 1500">
          </div>
        </div>

        <!-- Categorization -->
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
          <div class="input-group">
            <label for="type">Property Type</label>
            <div class="select-wrapper">
              <select id="type" required style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius);">
                <option value="house">House</option>
                <option value="apartment">Apartment</option>
                <option value="townhouse">Townhouse</option>
                <option value="villa">Villa</option>
              </select>
              <i class="ph ph-caret-down"></i>
            </div>
          </div>
          
          <div class="input-group">
            <label for="status">Listing Status</label>
            <div class="select-wrapper">
              <select id="status" required style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius);">
                <option value="buy">For Sale (Buy)</option>
                <option value="rent">For Rent</option>
                <option value="sold">Sold</option>
              </select>
              <i class="ph ph-caret-down"></i>
            </div>
          </div>

          <div class="input-group">
            <label>Is New Construction?</label>
            <label style="display: flex; align-items: center; gap: 8px; margin-top: 12px; font-weight: 500;">
              <input type="checkbox" id="isNew" style="width: 18px; height: 18px; cursor: pointer;">
              Yes, brand new
            </label>
          </div>
        </div>

        <!-- Image Upload -->
        <div class="input-group" style="margin-top: 12px;">
          <label for="image">Property Image</label>
          <input type="file" id="image" required accept="image/*" style="padding: 10px; background: #f8fafc; cursor: pointer;">
        </div>

        <button type="submit" class="btn btn-primary w-full" id="uploadBtn" style="margin-top: 24px;">Upload Listing</button>
      </form>
    </div>
  </main>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="toast.js"></script>
  <script src="admin.js"></script>
</body>
</html>
