<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vista | Login</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-page">

  <!-- NAVBAR (Minimal) -->
  <nav class="navbar">
    <div class="container nav-inner" style="justify-content: center;">
      <a href="index.html" class="logo">
        <i class="ph ph-house-line"></i> Vista
      </a>
    </div>
  </nav>

  <!-- AUTH CONTAINER -->
  <main class="auth-container">
    <div class="auth-card">
      <h2 id="authTitle">Welcome Back</h2>
      <p id="authSubtitle">Sign in to list properties or save homes.</p>
      
      <form id="authForm" class="auth-form">
        <!-- New Extra Fields for Sign Up Only -->
        <div id="signupFields" style="display: none;">
          <div class="input-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="John Doe">
          </div>
          <div class="input-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="(555) 123-4567">
          </div>
          <div class="input-group">
            <label for="role">I am a...</label>
            <div class="select-wrapper">
              <select id="role" style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius);">
                <option value="buyer">Home Buyer / Renter</option>
                <option value="agent">Real Estate Agent</option>
                <option value="seller">Home Seller</option>
              </select>
              <i class="ph ph-caret-down"></i>
            </div>
          </div>
        </div>

        <button id="googleBtn" type="button" class="btn btn-secondary w-full" style="margin-bottom: 24px; display: flex; align-items: center; justify-content: center; gap: 10px; background: white; border: 1px solid var(--border); color: var(--text-dark);">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 20px;">
          Continue with Google
        </button>
        
        <div style="position: relative; text-align: center; margin-bottom: 24px;">
          <hr style="border: none; border-top: 1px solid var(--border); position: absolute; top: 50%; left: 0; width: 100%; z-index: 0;">
          <span style="background: white; padding: 0 12px; color: var(--text-muted); font-size: 0.85rem; position: relative; z-index: 1;">OR CONTINUE WITH EMAIL</span>
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="input-group">
          <label for="password" style="display: flex; justify-content: space-between;">
            Password
            <button type="button" id="forgotPasswordBtn" class="clear-btn" style="font-size: 0.8rem; font-weight: 500; color: var(--primary);">Forgot?</button>
          </label>
          <div style="position: relative;">
            <input type="password" id="password" required placeholder="••••••••" style="padding-right: 48px; width: 100%; padding-top: 12px; padding-bottom: 12px; border: 1px solid var(--border); border-radius: var(--radius);">
            <button type="button" id="togglePasswordBtn" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.25rem; display: flex; cursor: pointer;">
              <i class="ph ph-eye" id="togglePasswordIcon"></i>
            </button>
          </div>
        </div>

        <div class="input-group" id="confirmPasswordGroup" style="display: none;">
          <label for="confirmPassword">Confirm Password</label>
          <div style="position: relative;">
            <input type="password" id="confirmPassword" placeholder="••••••••" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); padding-right: 48px;">
            <button type="button" id="toggleConfirmPasswordBtn" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.25rem; display: flex; cursor: pointer;">
              <i class="ph ph-eye" id="toggleConfirmPasswordIcon"></i>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary w-full" id="submitBtn">Sign In</button>
      </form>
      
      <div id="resendContainer" style="display: none; margin-top: 16px; text-align: center;">
        <button id="resendBtn" class="clear-btn">Resend Verification Email</button>
      </div>

      <div class="auth-footer">
        <span id="toggleText">Don't have an account?</span>
        <button id="toggleBtn" class="clear-btn">Sign Up</button>
      </div>
    </div>
  </main>

  <!-- COMPLETE PROFILE MODAL -->
  <div id="profileModal" style="display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;">
    <div class="auth-card" style="margin: 20px; box-shadow: var(--shadow-xl);">
      <h2 style="font-size: 1.5rem; text-align: center;">Complete Your Profile</h2>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 24px;">We just need a couple more details to set up your account.</p>
      <form id="profileForm" class="auth-form">
        <div class="input-group">
          <label for="modalPhone">Phone Number</label>
          <input type="tel" id="modalPhone" required placeholder="(555) 123-4567">
        </div>
        <div class="input-group">
          <label for="modalRole">I am a...</label>
          <div class="select-wrapper">
            <select id="modalRole" required style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius);">
              <option value="buyer">Home Buyer / Renter</option>
              <option value="agent">Real Estate Agent</option>
              <option value="seller">Home Seller</option>
            </select>
            <i class="ph ph-caret-down"></i>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-full" id="modalSubmitBtn" style="margin-top: 16px;">Save and Continue</button>
      </form>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
    (function(){
      emailjs.init({ publicKey: "eNCCmSZlHFbn4cJ97" });
    })();
  </script>
  
  <script src="supabase-config.js"></script>
  <script src="toast.js"></script>
  <script src="login.js"></script>
</body>
</html>
